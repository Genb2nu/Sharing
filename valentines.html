<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Will You Be My Valentine? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 24px;
            animation: float-up 6s ease-in infinite;
            opacity: 0.7;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 50px 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            z-index: 10;
            position: relative;
            max-width: 500px;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 20px 60px rgba(255, 105, 135, 0.3);
            }
            50% {
                box-shadow: 0 20px 80px rgba(255, 105, 135, 0.5);
            }
        }

        .bear {
            font-size: 100px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        h1 {
            color: #e84a5f;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            position: relative;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b8a, #ff8e9e);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 138, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(255, 107, 138, 0.6);
        }

        .btn-no {
            background: linear-gradient(135deg, #a0a0a0, #808080);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            position: absolute;
            transition: all 0.1s ease;
        }

        .btn-no:hover {
            transform: scale(0.9);
        }

        .success-container {
            display: none;
            text-align: center;
        }

        .success-container.show {
            display: block;
            animation: pop-in 0.5s ease-out;
        }

        @keyframes pop-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-emoji {
            font-size: 120px;
            margin-bottom: 20px;
            display: inline-block;
            animation: spin-heart 1s ease-in-out;
        }

        @keyframes spin-heart {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        .success-text {
            color: #e84a5f;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .success-subtext {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .confetti {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .message-counter {
            margin-top: 20px;
            color: #999;
            font-size: 0.9rem;
            font-style: italic;
        }

        .taunt-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 50px;
            color: #e84a5f;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 50;
        }

        .taunt-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>
    
    <div class="card">
        <div class="main-content" id="mainContent">
            <div class="bear">🧸💝</div>
            <h1>Will You Go On A Date With Me?</h1>
            <p class="subtitle">I promise to make you smile,<br>bring you flowers, and only tell<br>slightly terrible jokes! 🌹</p>
            
            <div class="buttons-container" id="buttonsContainer">
                <button class="btn btn-yes" id="yesBtn" onclick="sayYes()">Yes! 💕</button>
                <button class="btn btn-no" id="noBtn">No 😢</button>
            </div>
            
            <p class="message-counter" id="counter"></p>
        </div>
        
        <div class="success-container" id="successContainer">
            <div class="success-emoji">💑</div>
            <h2 class="success-text">YAYYY! You Made My Day! 🎉</h2>
            <p class="success-subtext">
                I knew you'd say yes! 😏<br>
                Can't wait for our date!<br>
                <span style="font-size: 2rem; margin-top: 10px; display: block;">💐🍫🎬🌙</span>
            </p>
        </div>
    </div>
    
    <div class="taunt-message" id="tauntMessage"></div>
    
    <canvas class="confetti" id="confetti"></canvas>

    <script>
        const noBtn = document.getElementById('noBtn');
        const buttonsContainer = document.getElementById('buttonsContainer');
        const tauntMessage = document.getElementById('tauntMessage');
        const counter = document.getElementById('counter');
        
        let attempts = 0;
        const taunts = [
            "Nice try! 😜",
            "Nope, not happening!",
            "You can't escape love! 💕",
            "The button is shy!",
            "Almost got it... NOT! 😂",
            "Keep trying, I dare you!",
            "This button has commitment issues!",
            "Oops, it moved again!",
            "Just say YES already! 🥺",
            "I can do this all day!",
            "The button says: 'Catch me if you can!'",
            "Plot twist: The No button is broken!",
            "Error 404: No option not found!",
            "This is the universe telling you something...",
            "Even the button knows you want to say YES!",
            "Resistance is futile! 💖"
        ];

        function getRandomPosition() {
            const containerRect = document.body.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            const maxX = containerRect.width - btnRect.width - 20;
            const maxY = containerRect.height - btnRect.height - 20;
            
            const randomX = Math.random() * maxX + 10;
            const randomY = Math.random() * maxY + 10;
            
            return { x: randomX, y: randomY };
        }

        function moveButton() {
            attempts++;
            const pos = getRandomPosition();
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top = pos.y + 'px';
            
            // Show taunt message
            const randomTaunt = taunts[Math.floor(Math.random() * taunts.length)];
            tauntMessage.textContent = randomTaunt;
            tauntMessage.classList.add('show');
            
            setTimeout(() => {
                tauntMessage.classList.remove('show');
            }, 1500);
            
            // Update counter
            if (attempts >= 3) {
                counter.textContent = `Escape attempts: ${attempts} — Just give up and say YES! 😄`;
            }
            
            // Make Yes button grow slightly with each attempt
            const yesBtn = document.getElementById('yesBtn');
            const currentScale = 1 + (attempts * 0.05);
            if (currentScale <= 1.5) {
                yesBtn.style.transform = `scale(${currentScale})`;
            }
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton();
        });

        function sayYes() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('successContainer').classList.add('show');
            
            // Trigger confetti
            launchConfetti();
            
            // Create more floating hearts
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createFloatingHeart(), i * 100);
            }
        }

        // Floating hearts background
        function createFloatingHeart() {
            const heartsContainer = document.getElementById('heartsContainer');
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💕', '💖', '💗', '💓', '💘', '💝', '🌹'][Math.floor(Math.random() * 8)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            heartsContainer.appendChild(heart);
            
            setTimeout(() => heart.remove(), 8000);
        }

        // Create initial hearts
        for (let i = 0; i < 15; i++) {
            setTimeout(() => createFloatingHeart(), i * 300);
        }
        setInterval(createFloatingHeart, 800);

        // Confetti effect
        function launchConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const confettiPieces = [];
            const colors = ['#ff6b8a', '#ff8e9e', '#ffd1dc', '#ff69b4', '#ff1493', '#ffb6c1', '#ffc0cb'];
            
            for (let i = 0; i < 150; i++) {
                confettiPieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20 - 10,
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let stillAnimating = false;
                
                confettiPieces.forEach(piece => {
                    piece.x += piece.vx;
                    piece.y += piece.vy;
                    piece.vy += 0.3; // gravity
                    piece.rotation += piece.rotationSpeed;
                    piece.vx *= 0.99;
                    
                    if (piece.y < canvas.height + 50) {
                        stillAnimating = true;
                        
                        ctx.save();
                        ctx.translate(piece.x, piece.y);
                        ctx.rotate(piece.rotation * Math.PI / 180);
                        ctx.fillStyle = piece.color;
                        ctx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size);
                        ctx.restore();
                    }
                });
                
                if (stillAnimating) {
                    requestAnimationFrame(animate);
                }
            }
            
            animate();
        }

        // Prevent right-click on No button
        noBtn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            moveButton();
        });
    </script>
</body>
</html>
